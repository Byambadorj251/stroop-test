<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stroop Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .app {
      width: 360px;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
    }

    .word {
      font-size: 54px;
      font-weight: 700;
      margin: 40px 0;
      min-height: 70px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    button.choice {
      border: none;
      border-radius: 999px;
      padding: 18px 14px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .controls {
      margin-top: 20px;
    }

    .controls button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .hint {
      margin-top: 18px;
      font-size: 14px;
      color: #475569;
      background: #f8fafc;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stats">
      <div class="card">
        <div>Time</div>
        <strong id="time">60</strong>
      </div>
      <div class="card">
        <div>Score</div>
        <strong id="score">0</strong>
      </div>
      <div class="card">
        <div>Accuracy</div>
        <strong id="accuracy">0%</strong>
      </div>
    </div>

    <div id="word" class="word">Press Start</div>

    <div class="buttons" id="buttons"></div>

    <div class="controls">
      <button id="startBtn">Start</button>
    </div>

    <div class="hint">
      Click the button that matches the <b>COLOR</b> of the word, not the text itself.
    </div>

    <div class="hint" id="avgBox">
      Average reaction time: <b id="avgTime">0 ms</b>
    </div>
  </div>

  <script>
    const COLORS = [
      { name: "RED", value: "red" },
      { name: "BLUE", value: "blue" },
      { name: "GREEN", value: "green" },
      { name: "YELLOW", value: "goldenrod" },
      { name: "BLACK", value: "black" }
    ];

    const timeEl = document.getElementById("time");
    const scoreEl = document.getElementById("score");
    const accuracyEl = document.getElementById("accuracy");
    const wordEl = document.getElementById("word");
    const buttonsEl = document.getElementById("buttons");
    const startBtn = document.getElementById("startBtn");
    const avgTimeEl = document.getElementById("avgTime");

    let score = 0;
    let total = 0;
    let timeLeft = 60;
    let timer = null;
    let currentAnswer = null;
    let startTime = null;
    let reactionTimes = [];
    let isRunning = false;

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function createButtons() {
      buttonsEl.innerHTML = "";
      COLORS.forEach(color => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = color.name;
        btn.style.background = color.value;
        btn.addEventListener("click", () => handleAnswer(color.name));
        buttonsEl.appendChild(btn);
      });
    }

    function nextQuestion() {
      const wordItem = COLORS[Math.floor(Math.random() * COLORS.length)];
      const colorItem = COLORS[Math.floor(Math.random() * COLORS.length)];

      wordEl.textContent = wordItem.name;
      wordEl.style.color = colorItem.value;

      currentAnswer = colorItem.name;
      startTime = performance.now();
    }

    function handleAnswer(selected) {
      if (!isRunning || !currentAnswer) return;

      const endTime = performance.now();
      const reaction = Math.round(endTime - startTime);
      reactionTimes.push(reaction);

      total++;
      if (selected === currentAnswer) {
        score++;
      }

      scoreEl.textContent = score;
      accuracyEl.textContent = Math.round((score / total) * 100) + "%";

      const avg =
        reactionTimes.length > 0
          ? Math.round(
              reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length
            )
          : 0;
      avgTimeEl.textContent = avg + " ms";

      nextQuestion();
    }

    function startGame() {
      score = 0;
      total = 0;
      timeLeft = 60;
      reactionTimes = [];
      isRunning = true;

      scoreEl.textContent = "0";
      accuracyEl.textContent = "0%";
      avgTimeEl.textContent = "0 ms";
      timeEl.textContent = timeLeft;
      startBtn.textContent = "Restart";

      nextQuestion();

      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timer);
          isRunning = false;
          wordEl.textContent = "Finished!";
          wordEl.style.color = "#111827";
          currentAnswer = null;
        }
      }, 1000);
    }

    createButtons();
    startBtn.addEventListener("click", startGame);
  </script>
</body>
</html>
